<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sleek 1v1 Fullscreen Chat & Call</title>
    <style>
        :root {
            --bg-color: #0b141a;
            --panel-bg: #202c33;
            --input-bg: #2a3942;
            --text-main: #e9edef;
            --text-sub: #8696a0;
            --msg-left: #202c33;
            --msg-right: #005c4b;
            --border-color: #2f3b43;
            --primary: #00a884;
        }

        .light-theme {
            --bg-color: #efeae2;
            --panel-bg: #f0f2f5;
            --input-bg: #ffffff;
            --text-main: #111b21;
            --text-sub: #667781;
            --msg-left: #ffffff;
            --msg-right: #d9fdd3;
            --border-color: #e9edef;
            --primary: #008069;
        }

        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            background: var(--bg-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }
        
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .app-container { 
            width: 100%; 
            height: 100%; 
            max-width: 500px; 
            background: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
            box-sizing: border-box;
        }
        
        @media (min-width: 480px) and (min-height: 700px) { 
            .app-container { 
                height: 95vh; 
                border-radius: 12px; 
                border: 1px solid var(--border-color); 
            } 
        }

        /* Header Style */
        .chat-header { 
            background: var(--panel-bg); 
            padding: 10px 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid var(--border-color); 
            flex-shrink: 0;
            -webkit-user-select: none; user-select: none;
        }
        .user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .avatar { width: 38px; height: 38px; background: #687e8c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; overflow: hidden; background-size: cover; background-position: center; }
        .user-status h3 { margin: 0; font-size: 15px; font-weight: 600; }
        .user-status span { font-size: 11px; color: var(--text-sub); }
        .header-buttons { display: flex; gap: 12px; align-items: center; }
        .header-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; color: var(--primary); -webkit-tap-highlight-color: transparent; }

        /* Main Chat View Container */
        #chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            height: 100%;
        }

        #chat-box { 
            flex: 1; 
            padding: 16px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            background-image: linear-gradient(rgba(11,20,26,0.95), rgba(11,20,26,0.95)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-size: contain; 
        }
        .light-theme #chat-box {
            background-image: linear-gradient(rgba(239,234,226,0.95), rgba(239,234,226,0.95)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
        }
        
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .msg.left { background: var(--msg-left); align-self: flex-start; color: var(--text-main); border-top-left-radius: 0; }
        .msg.right { background: var(--msg-right); align-self: flex-end; color: var(--text-main); border-top-right-radius: 0; }
        
        .chat-footer { 
            background: var(--panel-bg); 
            padding: 10px 12px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            flex-shrink: 0;
            box-sizing: border-box;
            position: relative;
        }
        .input-wrapper { flex: 1; background: var(--input-bg); border-radius: 24px; padding: 2px 12px; display: flex; align-items: center; gap: 8px; }
        input { width: 100%; padding: 10px 4px; border: none; background: transparent; color: var(--text-main); outline: none; font-size: 15px; }
        
        .emoji-toggle-btn { 
            background: none; 
            border: none; 
            font-size: 20px; 
            cursor: pointer; 
            color: var(--text-sub); 
            padding: 0; 
            display: flex; 
            align-items: center;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        #picker-container {
            display: none;
            position: absolute;
            bottom: 65px;
            left: 12px;
            z-index: 100;
            width: 280px;
            height: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        .send-btn { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            background: var(--primary); 
            border: none; 
            color: white; 
            font-size: 16px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            flex-shrink: 0;
            outline: none;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* CALL SCREEN */
        #fullscreen-call-screen {
            display: none; 
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, #1e363a, #0b141a);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 50px 20px;
            box-sizing: border-box;
            -webkit-user-select: none; user-select: none;
        }

        .call-profile { text-align: center; margin-top: 20px; }
        .call-avatar { width: 100px; height: 100px; background: #687e8c; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 36px; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); overflow: hidden; background-size: cover; background-position: center; }
        .call-name { font-size: 24px; font-weight: 600; margin: 0 0 8px 0; color: white; }
        .call-status { font-size: 14px; color: #8696a0; margin: 0; }

        .fullscreen-video-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #000;
            display: none;
        }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 90px; height: 130px; object-fit: cover; border-radius: 8px; border: 1px solid #555; z-index: 10; }

        .call-action-bar { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; }
        .call-ctrl-btn { width: 52px; height: 52px; border-radius: 50%; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; background: rgba(255,255,255,0.15); transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-hangup { background: #ea0038; width: 62px; height: 62px; font-size: 22px; }
        .active-off { background: rgba(234, 0, 56, 0.4) !important; color: #ff8fa3 !important; }
        .active-on { background: #00a884 !important; color: white !important; }

        #incoming-overlay { 
            display: none; 
            position: absolute; 
            top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(11,20,26,0.95); 
            z-index: 250; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 25px; 
            -webkit-user-select: none; user-select: none;
        }
        .ring-btn { padding: 14px 32px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 15px; color: white; display: flex; align-items: center; gap: 8px; -webkit-tap-highlight-color: transparent; }
        
        #avatar-input { display: none; }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/picmo@5.8.4/dist/umd/index.js"></script>
</head>
<body>

<div class="app-container" id="mainAppWrap">
    
    <div id="chat-view">
        <div class="chat-header">
            <div class="user-info" onclick="triggerProfileSetup()">
                <div class="avatar" id="main-avatar">C</div>
                <input type="file" id="avatar-input" accept="image/*" onchange="loadAvatar(event)">
                <div class="user-status">
                    <h3 id="header-title">Connected Peer</h3>
                    <span id="typing-status">online</span>
                </div>
            </div>
            <div class="header-buttons">
                <button class="header-btn" onclick="toggleTheme()" title="Toggle Theme">🌓</button>
                <button class="header-btn" onclick="startCall(false)">📞</button>
                <button class="header-btn" onclick="startCall(true)">📹</button>
            </div>
        </div>

        <div id="chat-box"></div>
        <div id="picker-container"></div>

        <div class="chat-footer">
            <div class="input-wrapper">
                <button class="emoji-toggle-btn" onclick="toggleEmojiPicker()" type="button">😀</button>
                <input type="text" id="message-input" placeholder="Type a message" onkeypress="handleKeyPress(event)" oninput="handleTyping(true)" onblur="handleTyping(false)">
            </div>
            <button class="send-btn" onclick="sendMessage()" type="button">🕊️</button>
        </div>
    </div>

    <div id="fullscreen-call-screen">
        <div class="fullscreen-video-wrapper" id="videoTracksWrapper">
            <video id="localVideo" autoplay muted playsinline></video>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>

        <div class="call-profile" id="callProfileDetails">
            <div class="call-avatar" id="call-screen-avatar">C</div>
            <h2 class="call-name" id="call-screen-name">Connected Peer</h2>
            <p class="call-status" id="callDurationLabel">Calling...</p>
        </div>

        <div class="call-action-bar">
            <button class="call-ctrl-btn" id="muteBtn" onclick="toggleMute()">🎙️</button>
            <button class="call-ctrl-btn" id="speakerBtn" onclick="toggleSpeaker()">🔊</button>
            <button class="call-ctrl-btn btn-hangup" onclick="hangupCall()">🛑</button>
            <button class="call-ctrl-btn" id="cameraBtn" onclick="toggleCamera()">📷</button>
        </div>
    </div>

    <div id="incoming-overlay">
        <div class="call-avatar" id="incoming-avatar">C</div>
        <h2 id="ring-label" style="color:white; margin:0; font-size: 22px;">Incoming Call...</h2>
        <div style="display:flex; gap:20px; margin-top: 10px;">
            <button class="ring-btn" onclick="answerCall()" style="background:#00a884;">🟢 Answer</button>
            <button class="ring-btn" onclick="hangupCall()" style="background:#ea0038;">❌ Decline</button>
        </div>
    </div>

</div>

<script>
    const BACKEND_URL = "https://dark-chat-backend-2v8y.onrender.com"; 
    const socket = io(BACKEND_URL);
    
    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const pickerContainer = document.getElementById('picker-container');
    
    let localStream;
    let peer;
    let incomingSignal;
    let isVideoCall = false;
    let typingTimeout;
    
    let micEnabled = true;
    let camEnabled = true;
    let speakerEnabled = true;

    // --- Profile Customization ---
    function triggerProfileSetup() {
        const newName = prompt("Enter peer display name:", document.getElementById('header-title').innerText);
        if(newName && newName.trim() !== "") {
            const updatedName = newName.trim();
            document.getElementById('header-title').innerText = updatedName;
            document.getElementById('call-screen-name').innerText = updatedName;
            document.getElementById('main-avatar').innerText = updatedName.charAt(0).toUpperCase();
            document.getElementById('call-screen-avatar').innerText = updatedName.charAt(0).toUpperCase();
            document.getElementById('incoming-avatar').innerText = updatedName.charAt(0).toUpperCase();
        }
        if(confirm("Do you want to change the profile photo?")) {
            document.getElementById('avatar-input').click();
        }
    }

    function loadAvatar(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgUrl = e.target.result;
                const avatars = ['main-avatar', 'call-screen-avatar', 'incoming-avatar'];
                avatars.forEach(id => {
                    const el = document.getElementById(id);
                    el.style.backgroundImage = `url('${imgUrl}')`;
                    el.innerText = '';
                });
            }
            reader.readAsDataURL(file);
        }
    }

    // --- Theme Switcher ---
    function toggleTheme() {
        document.body.classList.toggle('light-theme');
    }

    // --- Speaker Output Control Toggle ---
    function toggleSpeaker() {
        speakerEnabled = !speakerEnabled;
        const remoteVideo = document.getElementById('remoteVideo');
        if(remoteVideo) {
            remoteVideo.muted = !speakerEnabled;
        }
        const btn = document.getElementById('speakerBtn');
        btn.innerText = speakerEnabled ? "🔊" : "🔈";
        btn.classList.toggle('active-off', !speakerEnabled);
    }

    // --- Emoji Picker ---
    const picker = picmo.createPicker({ rootElement: pickerContainer, theme: 'dark' });
    picker.addEventListener('emoji:select', event => {
        messageInput.value += event.emoji;
        messageInput.focus();
    });
    function toggleEmojiPicker() {
        pickerContainer.style.display = pickerContainer.style.display === 'block' ? 'none' : 'block';
    }
    chatBox.addEventListener('click', () => pickerContainer.style.display = 'none');

    // --- TEXT CHAT & TYPING WITH DATABASE HISTORY ---
    socket.on('chat_history', (history) => {
        chatBox.innerHTML = ""; 
        history.forEach(msg => {
            const side = (msg.sender === socket.id) ? 'right' : 'left';
            appendMessage(msg.text, side);
        });
    });

    socket.on('receive_message', (msg) => appendMessage(msg, 'left'));
    
    socket.on('user_typing', (isTyping) => {
        document.getElementById('typing-status').innerText = isTyping ? "typing..." : "online";
    });
    
    function handleTyping(isTyping) {
        if (!isTyping) { socket.emit('typing', false); return; }
        socket.emit('typing', true);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => socket.emit('typing', false), 2000);
    }
    
    function sendMessage() {
        const message = messageInput.value.trim();
        if(message !== "") {
            socket.emit('send_message', message);
            appendMessage(message, 'right'); 
            messageInput.value = "";
            socket.emit('typing', false);
            pickerContainer.style.display = 'none';
            messageInput.focus();
        }
    }

    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
    
    function appendMessage(text, side) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg', side);
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- CALL LOGIC ---
    async function getMedia(wantVideo) {
        if (!localStream) {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: wantVideo });
            document.getElementById('localVideo').srcObject = localStream;
        }
        return localStream;
    }

    async function startCall(videoOption) {
        isVideoCall = videoOption;
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('fullscreen-call-screen').style.display = 'flex';
        document.getElementById('callDurationLabel').innerText = isVideoCall ? "Starting video call..." : "Starting voice call...";
        
        if (isVideoCall) {
            document.getElementById('videoTracksWrapper').style.display = 'block';
        } else {
            document.getElementById('videoTracksWrapper').style.display = 'none';
        }
        
        const stream = await getMedia(isVideoCall);
        peer = new SimplePeer({ initiator: true, trickle: false, stream: stream });

        peer.on('signal', (data) => {
            socket.emit('call_user', { signal: data, isVideo: isVideoCall });
        });

        peer.on('stream', (remoteStream) => {
            document.getElementById('remoteVideo').srcObject = remoteStream;
            document.getElementById('remoteVideo').muted = !speakerEnabled;
            document.getElementById('callDurationLabel').innerText = "Active Call";
        });
    }

    socket.on('incoming_call', (data) => {
        incomingSignal = data.signal;
        isVideoCall = data.isVideo; 
        document.getElementById('incoming-overlay').style.display = 'flex';
        document.getElementById('ring-label').innerText = isVideoCall ? "Incoming Video Call..." : "Incoming Voice Call...";
    });

    async function answerCall() {
        document.getElementById('incoming-overlay').style.display = 'none';
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('fullscreen-call-screen').style.display = 'flex';
        document.getElementById('callDurationLabel').innerText = "Connecting...";
        
        if (isVideoCall) {
            document.getElementById('videoTracksWrapper').style.display = 'block';
        } else {
            document.getElementById('videoTracksWrapper').style.display = 'none';
        }
        
        const stream = await getMedia(isVideoCall);
        peer = new SimplePeer({ initiator: false, trickle: false, stream: stream });

        peer.on('signal', (data) => {
            socket.emit('answer_call', { signal: data });
        });

        peer.on('stream', (remoteStream) => {
            document.getElementById('remoteVideo').srcObject = remoteStream;
            document.getElementById('remoteVideo').muted = !speakerEnabled;
            document.getElementById('callDurationLabel').innerText = "Active Call";
        });

        peer.signal(incomingSignal);
    }

    socket.on('call_accepted', (signal) => peer.signal(signal));

    function toggleMute() {
        if (localStream) {
            micEnabled = !micEnabled;
            localStream.getAudioTracks()[0].enabled = micEnabled;
            const btn = document.getElementById('muteBtn');
            btn.innerText = micEnabled ? "🎙️" : "🔇";
            btn.classList.toggle('active-off', !micEnabled);
        }
    }

    function toggleCamera() {
        if (localStream && localStream.getVideoTracks().length > 0) {
            camEnabled = !camEnabled;
            localStream.getVideoTracks()[0].enabled = camEnabled;
            const btn = document.getElementById('cameraBtn');
            btn.innerText = camEnabled ? "📷" : "❌📷";
            btn.classList.toggle('active-off', !camEnabled);
        }
    }

    function hangupCall() {
        socket.emit('hangup');
        resetUI();
    }

    socket.on('call_ended', () => resetUI());

    function resetUI() {
        if (peer) { peer.destroy(); peer = null; }
        if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        
        document.getElementById('localVideo').srcObject = null;
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('fullscreen-call-screen').style.display = 'none';
        document.getElementById('incoming-overlay').style.display = 'none';
        document.getElementById('chat-view').style.display = 'flex';
        
        micEnabled = true; camEnabled = true; speakerEnabled = true;
        document.getElementById('muteBtn').innerText = "🎙️";
        document.getElementById('muteBtn').classList.remove('active-off');
        document.getElementById('cameraBtn').innerText = "📷";
        document.getElementById('cameraBtn').classList.remove('active-off');
        document.getElementById('speakerBtn').innerText = "🔊";
        document.getElementById('speakerBtn').classList.remove('active-off');
    }

    function adjustMobileHeight() {
        const targetHeight = window.innerHeight;
        document.getElementById('mainAppWrap').style.height = targetHeight + 'px';
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    window.addEventListener('resize', adjustMobileHeight);
    window.addEventListener('load', adjustMobileHeight);
    adjustMobileHeight();
</script>
</body>
</html>
