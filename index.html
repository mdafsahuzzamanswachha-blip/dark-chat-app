<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Aurora Snap — Dark Chat</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#04060a;
      --panel: rgba(255,255,255,0.03);
      --glass: rgba(255,255,255,0.02);
      --neon:#00ff9d;
      --cyan:#00e5ff;
      --purple:#9b7bff;
      --text:#e6f7ff;
      --muted:#88a6b8;
      --radius:14px;
      --glow: 0 8px 40px rgba(0,255,157,0.08);
      --glass-blur:10px;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
    }

    *{box-sizing:border-box}
    html,body,#app{height:100%;margin:0;background:
      radial-gradient(1200px 600px at 10% 10%, rgba(155,123,255,0.06), transparent 10%),
      radial-gradient(800px 500px at 90% 80%, rgba(0,229,255,0.04), transparent 10%),
      var(--bg);
    color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}

    /* Topbar */
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-radius:12px;margin:16px;backdrop-filter:blur(var(--glass-blur));background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.03));border:1px solid rgba(255,255,255,0.03)}
    .brand{font-weight:700;letter-spacing:0.4px}
    .status{color:var(--muted); font-weight: 600;}

    /* Layout */
    .main{display:flex;gap:14px;padding:12px;height:calc(100% - 88px)}
    .left-panel{width:260px;min-width:200px;display:flex;flex-direction:column;gap:12px;padding:12px;border-radius:12px}
    .center{flex:1;display:flex;flex-direction:column;border-radius:12px;padding:12px;min-width:0}

    /* glass style */
    .glass{backdrop-filter:blur(var(--glass-blur));background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.03));border:1px solid rgba(255,255,255,0.03);box-shadow:var(--glow)}

    /* profile */
    .profile{display:flex;gap:12px;align-items:center;padding:6px}
    .avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, rgba(255,255,255,0.02), rgba(0,0,0,0.03));border:1px solid rgba(255,255,255,0.03);font-weight:700}
    .avatar.large{width:92px;height:92px;font-size:20px}
    .meta .name{font-weight:600}
    .meta .sub{font-size:13px;color:var(--muted)}

    /* controls */
    .controls{display:flex;gap:8px;flex-wrap:wrap;padding:6px}
    .icon-btn{background:transparent;border:none;color:var(--neon);cursor:pointer;padding:8px;border-radius:10px; font-size: 18px;}
    .btn{padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:var(--text);cursor:pointer}
    .btn.small{padding:6px 10px}
    .btn.neon{background:linear-gradient(90deg,var(--neon),var(--cyan));color:#001018;font-weight:700;box-shadow:0 6px 26px rgba(0,255,157,0.08)}
    .btn.danger{background:linear-gradient(90deg,#ff5b6f,#ea0038);color:#fff}

    /* snap area */
    .snap-area{display:flex;flex-direction:column;gap:8px;padding:10px;min-height:220px;align-items:center}
    .snap-head{font-weight:600;color:var(--muted)}
    #snapVideo{width:100%;height:160px;border-radius:10px;background:#000;object-fit:cover}
    #snapCanvas{width:100%;border-radius:10px}

    /* chat box */
    .chat-box{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px;position:relative}
    .chat-box:empty::before{content:attr(data-empty);color:var(--muted);position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);opacity:0.7}

    /* messages */
    .msg{max-width:78%;padding:8px 12px;border-radius:12px;backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.02)}
    .msg.left{align-self:flex-start;background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.02))}
    .msg.right{align-self:flex-end;background:linear-gradient(180deg, rgba(0,255,157,0.1), rgba(0,255,157,0.02));border:1px solid rgba(0,255,157,0.15)}
    .msg img{max-width:100%; border-radius:10px;display:block; margin-top: 5px;}
    .msg .meta{font-size:11px;color:var(--muted);margin-bottom:4px}

    /* composer */
    .composer{display:flex;gap:8px;align-items:center;padding:10px;border-top:1px solid rgba(255,255,255,0.02)}
    .composer-left{display:flex;gap:8px}
    #messageInput{flex:1;padding:10px 16px;border-radius:999px;border:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.2);color:var(--text); outline: none;}
    
    /* call overlay */
    .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:60;background:rgba(0,0,0,0.8)}
    .overlay.hidden{display:none !important}
    .call-card{width:90%;max-width:800px;padding:20px;border-radius:16px;display:flex;flex-direction:column;align-items:center;gap:12px}
    .call-header{display:flex;gap:12px;align-items:center;width:100%}
    .call-videos{position:relative;width:100%;height:380px;background:#000;border-radius:12px;overflow:hidden}
    .call-videos video{width:100%;height:100%;object-fit:cover}
    .call-videos .local{position:absolute;right:12px;bottom:12px;width:120px;height:160px;border-radius:10px;border:2px solid var(--neon); background:#111; z-index: 2;}
    .call-actions{display:flex;gap:12px;align-items:center; margin-top: 10px;}
    .ctrl{width:56px;height:56px;border-radius:50%;border:none;background:rgba(255,255,255,0.1);display:inline-flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer; font-size: 20px;}
    .ctrl.danger{background:#ff5b6f;color:#fff}
    .ctrl.active{background: var(--neon); color: #000;}

    /* incoming card */
    .incoming-card{padding:24px; border-radius: 16px; text-align: center; display: flex; flex-direction: column; gap: 16px;}
    .incoming-actions{display: flex; gap: 12px; justify-content: center;}

    @media (max-width:860px){
      .main{flex-direction:column;padding:10px}
      .left-panel{width:100%;display:flex;flex-direction:row;align-items:flex-start}
      .center{width:100%}
      .call-videos{height:50vh}
    }

    .msg{animation:slideIn .28s ease both}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  </style>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="topbar glass">
      <div class="brand">Aurora Snap</div>
      <div class="top-right" style="display: flex; gap: 10px; align-items: center;">
        <div id="status" class="status">connecting...</div>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">🌓</button>
      </div>
    </header>

    <main class="main">
      <aside class="left-panel glass">
        <div class="profile">
          <div id="myAvatar" class="avatar">Y</div>
          <div class="meta">
            <div id="myName" class="name">You</div>
            <div id="myStatus" class="sub">Available</div>
          </div>
        </div>

        <div class="controls">
          <button id="openSnap" class="btn small neon">Snap</button>
          <input id="fileInput" type="file" accept="image/*,audio/*,video/*,*/*" hidden>
          <button id="attach" class="btn small">Attach</button>
          <button id="startCallBtn" class="btn small neon">Call</button>
        </div>

        <div class="snap-area glass" id="snapArea" style="display:none;">
          <div class="snap-head">Snap Camera</div>
          <video id="snapVideo" autoplay muted playsinline></video>
          <canvas id="snapCanvas" hidden></canvas>
          <div class="snap-actions" style="display: flex; gap: 6px; margin-top: 6px;">
            <button id="captureBtn" class="btn small neon">Capture</button>
            <button id="sendSnapBtn" class="btn small">Send</button>
            <button id="closeSnapBtn" class="btn small danger">Close</button>
          </div>
        </div>
      </aside>

      <section class="center glass">
        <div id="chatBox" class="chat-box" data-empty="No messages yet"></div>

        <div class="composer">
          <div class="composer-left">
            <button id="camBtn" class="icon-btn" title="Open Snap">📷</button>
          </div>

          <input id="messageInput" placeholder="Send a chat or press Enter" autocomplete="off" />

          <div class="composer-right">
            <button id="sendBtn" class="btn neon" title="Send message">➤</button>
          </div>
        </div>
      </section>
    </main>

    <div id="callOverlay" class="overlay hidden">
      <div class="call-card glass">
        <div class="call-header">
          <div id="callAvatar" class="avatar large">C</div>
          <div class="call-meta">
            <div id="callName" class="name">Peer</div>
            <div id="callState" class="sub">Connecting...</div>
          </div>
        </div>

        <div class="call-videos">
          <video id="remoteVideo" autoplay playsinline></video>
          <video id="localVideo" class="local" autoplay muted playsinline></video>
        </div>

        <div class="call-actions">
          <button id="muteBtn" class="ctrl" title="Mute">🎙️</button>
          <button id="cameraToggleBtn" class="ctrl" title="Toggle camera">📷</button>
          <button id="hangupBtn" class="ctrl danger" title="End call">🛑</button>
        </div>
      </div>
    </div>

    <div id="incoming" class="overlay hidden">
      <div class="incoming-card glass">
        <div id="incomingText" style="font-size: 18px; font-weight: 600;">Incoming call...</div>
        <div class="incoming-actions">
          <button id="answerBtn" class="btn neon">Answer</button>
          <button id="declineBtn" class="btn danger">Decline</button>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const peerConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:openrelay.metered.ca:80' },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
      ]
    };

    window.addEventListener('DOMContentLoaded', () => {
      // Direct Backend Connection
      const socket = io("https://dark-chat-backend-2v8y.onrender.com");

      // DOM Elements
      const statusEl = document.getElementById('status');
      const sendBtn = document.getElementById('sendBtn');
      const messageInput = document.getElementById('messageInput');
      const chatBox = document.getElementById('chatBox');
      const fileInput = document.getElementById('fileInput');
      const attachBtn = document.getElementById('attach');
      const startCallBtn = document.getElementById('startCallBtn');
      const camBtn = document.getElementById('camBtn');

      const callOverlay = document.getElementById('callOverlay');
      const incoming = document.getElementById('incoming');
      const answerBtn = document.getElementById('answerBtn');
      const declineBtn = document.getElementById('declineBtn');
      const remoteVideo = document.getElementById('remoteVideo');
      const localVideoEl = document.getElementById('localVideo');
      const hangupBtn = document.getElementById('hangupBtn');
      const muteBtn = document.getElementById('muteBtn');
      const cameraToggleBtn = document.getElementById('cameraToggleBtn');

      const openSnap = document.getElementById('openSnap');
      const snapArea = document.getElementById('snapArea');
      const snapVideo = document.getElementById('snapVideo');
      const captureBtn = document.getElementById('captureBtn');
      const sendSnapBtn = document.getElementById('sendSnapBtn');
      const closeSnapBtn = document.getElementById('closeSnapBtn');
      const snapCanvas = document.getElementById('snapCanvas');
      const themeToggle = document.getElementById('themeToggle');

      let localStream = null;
      let peer = null;
      let isCalling = false;
      let incomingSignalData = null;

      function appendMessage({ from='me', fromName=null, text='', attachment=null, ts=Date.now() }){
        const el = document.createElement('div');
        el.className = 'msg ' + (from === 'me' ? 'right' : 'left');
        
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `${from === 'me' ? 'You' : (fromName || 'Peer')} • ${new Date(ts).toLocaleTimeString()}`;
        el.appendChild(meta);

        if(text){
          const p = document.createElement('div');
          p.textContent = text;
          el.appendChild(p);
        }

        if(attachment){
          if(attachment.type && attachment.type.startsWith('image')){
            const img = document.createElement('img');
            img.src = attachment.data;
            el.appendChild(img);
          } else {
            const a = document.createElement('a');
            a.href = attachment.data;
            a.textContent = attachment.name || 'Attachment';
            a.target = '_blank';
            a.style.color = '#00ff9d';
            el.appendChild(a);
          }
        }

        chatBox.appendChild(el);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function readFileAsDataURL(file){
        return new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
      }

      // 1. Messaging Controls
      function sendMessage(){
        const txt = (messageInput.value || '').trim();
        if(!txt) return;
        const payload = { text: txt, ts: Date.now() };
        socket.emit('send_message', payload);
        appendMessage({ from: 'me', text: txt, ts: payload.ts });
        messageInput.value = '';
      }

      sendBtn.addEventListener('click', sendMessage);
      messageInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter'){
          e.preventDefault();
          sendMessage();
        }
      });

      // 2. Attachments
      attachBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', async (e) => {
        const file = e.target.files && e.target.files[0];
        if(!file) return;
        const data = await readFileAsDataURL(file);
        const attachment = { name: file.name, type: file.type, data };
        socket.emit('send_message', { attachment, ts: Date.now() });
        appendMessage({ from: 'me', attachment, ts: Date.now() });
        fileInput.value = '';
      });

      // 3. Snap Camera
      const toggleSnap = async () => {
        if(snapArea.style.display === 'flex'){
          closeSnap();
          return;
        }
        snapArea.style.display = 'flex';
        try{
          const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          snapVideo.srcObject = s;
          snapVideo.play();
          snapArea._stream = s;
        }catch(err){
          alert('Camera permission error: ' + err.message);
          snapArea.style.display = 'none';
        }
      };

      openSnap.addEventListener('click', toggleSnap);
      camBtn.addEventListener('click', toggleSnap);

      captureBtn.addEventListener('click', () => {
        if(!snapVideo || !snapVideo.srcObject) return;
        const w = snapVideo.videoWidth || 640;
        const h = snapVideo.videoHeight || 480;
        snapCanvas.width = w;
        snapCanvas.height = h;
        const ctx = snapCanvas.getContext('2d');
        ctx.drawImage(snapVideo, 0, 0, w, h);
        snapCanvas.hidden = false;
      });

      sendSnapBtn.addEventListener('click', () => {
        if(snapCanvas.hidden) return alert('Capture a snap first!');
        const data = snapCanvas.toDataURL('image/png');
        const attachment = { name: 'snap.png', type: 'image/png', data };
        socket.emit('send_message', { attachment, ts: Date.now() });
        appendMessage({ from: 'me', attachment, ts: Date.now() });
        closeSnap();
      });

      closeSnapBtn.addEventListener('click', closeSnap);

      function closeSnap(){
        if(snapArea._stream){
          snapArea._stream.getTracks().forEach(t => t.stop());
          snapArea._stream = null;
        }
        snapVideo.srcObject = null;
        snapCanvas.hidden = true;
        snapArea.style.display = 'none';
      }

      themeToggle.addEventListener('click', () => document.documentElement.classList.toggle('light'));

      // 4. Socket Event Listeners
      socket.on('connect', () => {
        statusEl.textContent = 'online';
        statusEl.style.color = '#00ff9d';
        socket.emit('set_username', { name: 'User-' + socket.id.slice(0, 4) });
      });

      socket.on('disconnect', () => {
        statusEl.textContent = 'offline';
        statusEl.style.color = '#ff5b6f';
      });

      // Broadcast Message Handling (Fixes message receiving issue)
      socket.on('broadcast_message', (payload) => {
        if(payload.from !== socket.id){
          appendMessage({
            from: payload.from,
            fromName: payload.fromName,
            text: payload.text,
            attachment: payload.attachment,
            ts: payload.ts
          });
        }
      });

      // 5. WebRTC Video Call Logic
      startCallBtn.addEventListener('click', async () => {
        if(isCalling) return;
        try{
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
          localVideoEl.srcObject = localStream;
          callOverlay.classList.remove('hidden');
          document.getElementById('callState').textContent = 'Calling...';
          isCalling = true;
          startPeer(true);
        }catch(err){
          alert('Mic & Camera permissions required for calls: ' + err.message);
        }
      });

      socket.on('incoming_call', (data) => {
        incomingSignalData = data.signal;
        incoming.classList.remove('hidden');
        document.getElementById('incomingText').textContent = `${data.callerName || 'Peer'} is calling...`;
      });

      answerBtn.onclick = async () => {
        incoming.classList.add('hidden');
        try{
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
          localVideoEl.srcObject = localStream;
          callOverlay.classList.remove('hidden');
          isCalling = true;
          startPeer(false);
          if(peer && incomingSignalData){
            peer.signal(incomingSignalData);
          }
        }catch(err){
          alert('Could not access Camera/Mic to answer: ' + err.message);
        }
      };

      declineBtn.onclick = () => {
        incoming.classList.add('hidden');
        socket.emit('decline_call', {});
      };

      socket.on('call_answered', (data) => {
        if(peer && data.signal){
          peer.signal(data.signal);
        }
        document.getElementById('callState').textContent = 'Connected';
      });

      socket.on('call_ended', () => endCall());
      socket.on('call_declined', () => {
        alert('Peer declined your call.');
        endCall();
      });

      function startPeer(initiator){
        peer = new SimplePeer({
          initiator: initiator,
          trickle: true,
          stream: localStream,
          config: peerConfig
        });

        peer.on('signal', data => {
          if(initiator){
            socket.emit('call_user', { signal: data, isVideo: true });
          } else {
            socket.emit('answer_call', { signal: data });
          }
        });

        peer.on('stream', stream => {
          remoteVideo.srcObject = stream;
          document.getElementById('callState').textContent = 'Connected';
        });

        peer.on('error', err => {
          console.error('Peer error:', err);
          endCall();
        });

        peer.on('close', () => endCall());
      }

      hangupBtn.addEventListener('click', () => {
        socket.emit('end_call', {});
        endCall();
      });

      muteBtn.addEventListener('click', () => {
        if(!localStream) return;
        const audioTrack = localStream.getAudioTracks()[0];
        if(audioTrack){
          audioTrack.enabled = !audioTrack.enabled;
          muteBtn.classList.toggle('active', !audioTrack.enabled);
          muteBtn.textContent = audioTrack.enabled ? '🎙️' : '🔇';
        }
      });

      cameraToggleBtn.addEventListener('click', () => {
        if(!localStream) return;
        const videoTrack = localStream.getVideoTracks()[0];
        if(videoTrack){
          videoTrack.enabled = !videoTrack.enabled;
          cameraToggleBtn.classList.toggle('active', !videoTrack.enabled);
          cameraToggleBtn.textContent = videoTrack.enabled ? '📷' : '🚫';
        }
      });

      function endCall(){
        if(peer){
          try{ peer.destroy(); }catch(e){}
          peer = null;
        }
        if(localStream){
          localStream.getTracks().forEach(t => t.stop());
          localStream = null;
        }
        remoteVideo.srcObject = null;
        localVideoEl.srcObject = null;
        isCalling = false;
        callOverlay.classList.add('hidden');
        incoming.classList.add('hidden');
        document.getElementById('callState').textContent = 'Disconnected';
      }
    });
  })();
  </script>
</body>
</html>
