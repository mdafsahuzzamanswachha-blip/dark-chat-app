<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aurora Snap — Dark Chat</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#04060a;
      --panel: rgba(255,255,255,0.03);
      --glass: rgba(255,255,255,0.02);
      --neon:#00ff9d;
      --cyan:#00e5ff;
      --purple:#9b7bff;
      --text:#e6f7ff;
      --muted:#88a6b8;
      --radius:14px;
      --glow: 0 8px 40px rgba(0,255,157,0.08);
      --glass-blur:10px;
      font-family: 'Inter', system-ui, -apple-system, Roboto, sans-serif;
    }

    *{box-sizing:border-box}
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* ব্যাকগ্রাউন্ড স্ক্রল বন্ধ */
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(155,123,255,0.06), transparent 10%),
        radial-gradient(800px 500px at 90% 80%, rgba(0,229,255,0.04), transparent 10%),
        var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh; /* মোবাইলের আসল হাইট */
      width: 100vw;
      padding: 8px;
      gap: 8px;
    }

    .glass{
      backdrop-filter: blur(var(--glass-blur));
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.03));
      border: 1px solid rgba(255,255,255,0.03);
      box-shadow: var(--glow);
    }

    /* Topbar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      border-radius: 12px;
      flex-shrink: 0;
    }
    .brand{font-weight:700; letter-spacing:0.4px}
    .status{color:var(--muted); font-weight: 600;}

    /* Main Layout */
    .main {
      display: flex;
      gap: 10px;
      flex: 1;
      min-height: 0; /* চ্যাট বক্সে স্ক্রলিং সচল রাখার জন্য */
    }

    /* Left Panel Fix */
    .left-panel {
      width: 260px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .profile { display: flex; gap: 10px; align-items: center; }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(0,0,0,0.03));
      border: 1px solid rgba(255,255,255,0.03); font-weight: 700;
    }
    .avatar.large{ width:80px; height:80px; font-size:20px }
    .meta .name{ font-weight:600 }
    .meta .sub{ font-size:12px; color:var(--muted) }

    .controls { display: flex; gap: 6px; flex-wrap: wrap; }
    .icon-btn { background: transparent; border: none; color: var(--neon); cursor: pointer; padding: 6px; font-size: 18px; }
    .btn { padding: 6px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.03); background: transparent; color: var(--text); cursor: pointer; font-size: 13px;}
    .btn.small { padding: 6px 10px; }
    .btn.neon { background: linear-gradient(90deg,var(--neon),var(--cyan)); color: #001018; font-weight: 700; }
    .btn.danger { background: linear-gradient(90deg,#ff5b6f,#ea0038); color: #fff; }

    /* Snap Area */
    .snap-area { display: flex; flex-direction: column; gap: 6px; padding: 8px; align-items: center; }
    #snapVideo { width: 100%; height: 120px; border-radius: 8px; background: #000; object-fit: cover; }
    #snapCanvas { width: 100%; border-radius: 8px; }

    /* Center (Chat Section) */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      padding: 8px;
      min-width: 0;
      height: 100%;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }
    .chat-box:empty::before {
      content: attr(data-empty);
      color: var(--muted);
      position: absolute; left: 50%; top: 48%;
      transform: translate(-50%,-50%); opacity: 0.7;
    }

    /* Messages Style */
    .msg {
      max-width: 82%;
      padding: 8px 12px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.02);
      word-break: break-word;
    }
    .msg.left {
      align-self: flex-start;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.02));
    }
    .msg.right {
      align-self: flex-end;
      background: linear-gradient(180deg, rgba(0,255,157,0.12), rgba(0,255,157,0.02));
      border: 1px solid rgba(0,255,157,0.2);
    }
    .msg img { max-width: 100%; border-radius: 8px; display: block; margin-top: 4px; }
    .msg .meta { font-size: 10px; color: var(--muted); margin-bottom: 2px; }

    /* Composer Fix */
    .composer {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 6px;
      border-top: 1px solid rgba(255,255,255,0.02);
      flex-shrink: 0;
    }
    #messageInput {
      flex: 1;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2);
      color: var(--text);
      outline: none;
      font-size: 14px;
    }

    /* Overlays */
    .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 60; background: rgba(0,0,0,0.85); }
    .overlay.hidden { display: none !important; }
    .call-card { width: 92%; max-width: 700px; padding: 16px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .call-videos { position: relative; width: 100%; height: 320px; background: #000; border-radius: 12px; overflow: hidden; }
    .call-videos video { width: 100%; height: 100%; object-fit: cover; }
    .call-videos .local { position: absolute; right: 10px; bottom: 10px; width: 100px; height: 130px; border-radius: 8px; border: 2px solid var(--neon); background: #111; z-index: 2; }
    .call-actions { display: flex; gap: 10px; margin-top: 6px; }
    .ctrl { width: 48px; height: 48px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: var(--text); cursor: pointer; font-size: 18px; }
    .ctrl.danger { background: #ff5b6f; color: #fff; }

    .incoming-card { padding: 20px; border-radius: 16px; text-align: center; display: flex; flex-direction: column; gap: 12px; }
    .incoming-actions { display: flex; gap: 10px; justify-content: center; }

    /* 📱 Mobile Specific Layout Fixes */
    @media (max-width: 768px) {
      .main {
        flex-direction: column;
        gap: 6px;
      }
      .left-panel {
        width: 100%;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        gap: 6px;
      }
      .controls { flex-wrap: nowrap; }
      .snap-area {
        position: fixed;
        top: 60px;
        left: 8px;
        right: 8px;
        z-index: 50;
        background: #000;
      }
      .chat-box { padding: 4px; }
    }
  </style>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="topbar glass">
      <div class="brand">Aurora Snap</div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <div id="status" class="status">connecting...</div>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">🌓</button>
      </div>
    </header>

    <main class="main">
      <aside class="left-panel glass">
        <div class="profile">
          <div id="myAvatar" class="avatar">Y</div>
          <div class="meta">
            <div id="myName" class="name">You</div>
            <div id="myStatus" class="sub">Online: 1</div>
          </div>
        </div>

        <div class="controls">
          <button id="openSnap" class="btn small neon">Snap</button>
          <input id="fileInput" type="file" accept="image/*,audio/*,video/*,*/*" hidden>
          <button id="attach" class="btn small">Attach</button>
          <button id="startCallBtn" class="btn small neon">Call</button>
        </div>

        <div class="snap-area glass" id="snapArea" style="display:none;">
          <div style="font-weight:600; color:var(--muted); font-size:12px;">Snap Camera</div>
          <video id="snapVideo" autoplay muted playsinline></video>
          <canvas id="snapCanvas" hidden></canvas>
          <div style="display: flex; gap: 6px; margin-top: 4px;">
            <button id="captureBtn" class="btn small neon">Capture</button>
            <button id="sendSnapBtn" class="btn small">Send</button>
            <button id="closeSnapBtn" class="btn small danger">Close</button>
          </div>
        </div>
      </aside>

      <section class="center glass">
        <div id="chatBox" class="chat-box" data-empty="No messages yet"></div>

        <div class="composer">
          <button id="camBtn" class="icon-btn" title="Open Snap">📷</button>
          <input id="messageInput" placeholder="Send a chat..." autocomplete="off" />
          <button id="sendBtn" class="btn neon" title="Send message">➤</button>
        </div>
      </section>
    </main>

    <div id="callOverlay" class="overlay hidden">
      <div class="call-card glass">
        <div style="display:flex; gap:10px; align-items:center; width:100%;">
          <div id="callAvatar" class="avatar large">C</div>
          <div>
            <div id="callName" class="name">Peer</div>
            <div id="callState" class="sub">Connecting...</div>
          </div>
        </div>

        <div class="call-videos">
          <video id="remoteVideo" autoplay playsinline></video>
          <video id="localVideo" class="local" autoplay muted playsinline></video>
        </div>

        <div class="call-actions">
          <button id="muteBtn" class="ctrl">🎙️</button>
          <button id="cameraToggleBtn" class="ctrl">📷</button>
          <button id="hangupBtn" class="ctrl danger">🛑</button>
        </div>
      </div>
    </div>

    <div id="incoming" class="overlay hidden">
      <div class="incoming-card glass">
        <div id="incomingText" style="font-size: 16px; font-weight: 600;">Incoming call...</div>
        <div class="incoming-actions">
          <button id="answerBtn" class="btn neon">Answer</button>
          <button id="declineBtn" class="btn danger">Decline</button>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const peerConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    };

    window.addEventListener('DOMContentLoaded', () => {
      const socket = io("https://dark-chat-backend-2v8y.onrender.com");

      const statusEl = document.getElementById('status');
      const sendBtn = document.getElementById('sendBtn');
      const messageInput = document.getElementById('messageInput');
      const chatBox = document.getElementById('chatBox');
      const fileInput = document.getElementById('fileInput');
      const attachBtn = document.getElementById('attach');
      const startCallBtn = document.getElementById('startCallBtn');
      const camBtn = document.getElementById('camBtn');

      const callOverlay = document.getElementById('callOverlay');
      const incoming = document.getElementById('incoming');
      const answerBtn = document.getElementById('answerBtn');
      const declineBtn = document.getElementById('declineBtn');
      const remoteVideo = document.getElementById('remoteVideo');
      const localVideoEl = document.getElementById('localVideo');
      const hangupBtn = document.getElementById('hangupBtn');
      const muteBtn = document.getElementById('muteBtn');
      const cameraToggleBtn = document.getElementById('cameraToggleBtn');

      const openSnap = document.getElementById('openSnap');
      const snapArea = document.getElementById('snapArea');
      const snapVideo = document.getElementById('snapVideo');
      const captureBtn = document.getElementById('captureBtn');
      const sendSnapBtn = document.getElementById('sendSnapBtn');
      const closeSnapBtn = document.getElementById('closeSnapBtn');
      const snapCanvas = document.getElementById('snapCanvas');
      const themeToggle = document.getElementById('themeToggle');

      let localStream = null;
      let peer = null;
      let isCalling = false;
      let incomingSignalData = null;

      function appendMessage({ senderId, fromName, text='', attachment=null, ts=Date.now() }){
        const isMe = (senderId === socket.id);
        const el = document.createElement('div');
        el.className = 'msg ' + (isMe ? 'right' : 'left');
        
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `${isMe ? 'You' : (fromName || 'Peer')} • ${new Date(ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        el.appendChild(meta);

        if(text){
          const p = document.createElement('div');
          p.textContent = text;
          el.appendChild(p);
        }

        if(attachment){
          if(attachment.type && attachment.type.startsWith('image')){
            const img = document.createElement('img');
            img.src = attachment.data;
            el.appendChild(img);
          } else {
            const a = document.createElement('a');
            a.href = attachment.data;
            a.textContent = attachment.name || 'Attachment';
            a.target = '_blank';
            a.style.color = '#00ff9d';
            el.appendChild(a);
          }
        }

        chatBox.appendChild(el);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function readFileAsDataURL(file){
        return new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
      }

      function sendMessage(){
        const txt = (messageInput.value || '').trim();
        if(!txt) return;
        const payload = { text: txt, ts: Date.now() };
        socket.emit('send_message', payload);
        appendMessage({ senderId: socket.id, text: txt, ts: payload.ts });
        messageInput.value = '';
      }

      sendBtn.addEventListener('click', sendMessage);
      messageInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter'){
          e.preventDefault();
          sendMessage();
        }
      });

      attachBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', async (e) => {
        const file = e.target.files && e.target.files[0];
        if(!file) return;
        const data = await readFileAsDataURL(file);
        const attachment = { name: file.name, type: file.type, data };
        socket.emit('send_message', { attachment, ts: Date.now() });
        appendMessage({ senderId: socket.id, attachment, ts: Date.now() });
        fileInput.value = '';
      });

      const toggleSnap = async () => {
        if(snapArea.style.display === 'flex'){
          closeSnap();
          return;
        }
        snapArea.style.display = 'flex';
        try{
          const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          snapVideo.srcObject = s;
          snapVideo.play();
          snapArea._stream = s;
        }catch(err){
          alert('Camera error: ' + err.message);
          snapArea.style.display = 'none';
        }
      };

      openSnap.addEventListener('click', toggleSnap);
      camBtn.addEventListener('click', toggleSnap);

      captureBtn.addEventListener('click', () => {
        if(!snapVideo || !snapVideo.srcObject) return;
        const w = snapVideo.videoWidth || 640;
        const h = snapVideo.videoHeight || 480;
        snapCanvas.width = w;
        snapCanvas.height = h;
        const ctx = snapCanvas.getContext('2d');
        ctx.drawImage(snapVideo, 0, 0, w, h);
        snapCanvas.hidden = false;
      });

      sendSnapBtn.addEventListener('click', () => {
        if(snapCanvas.hidden) return alert('Capture a snap first!');
        const data = snapCanvas.toDataURL('image/png');
        const attachment = { name: 'snap.png', type: 'image/png', data };
        socket.emit('send_message', { attachment, ts: Date.now() });
        appendMessage({ senderId: socket.id, attachment, ts: Date.now() });
        closeSnap();
      });

      closeSnapBtn.addEventListener('click', closeSnap);

      function closeSnap(){
        if(snapArea._stream){
          snapArea._stream.getTracks().forEach(t => t.stop());
          snapArea._stream = null;
        }
        snapVideo.srcObject = null;
        snapCanvas.hidden = true;
        snapArea.style.display = 'none';
      }

      themeToggle.addEventListener('click', () => document.documentElement.classList.toggle('light'));

      socket.on('connect', () => {
        statusEl.textContent = 'online';
        statusEl.style.color = '#00ff9d';
      });

      socket.on('disconnect', () => {
        statusEl.textContent = 'offline';
        statusEl.style.color = '#ff5b6f';
      });

      socket.on('user_count_update', (count) => {
        document.getElementById('myStatus').textContent = `Online: ${count}`;
      });

      socket.on('receive_message', (payload) => {
        appendMessage({
          senderId: payload.from,
          fromName: payload.fromName,
          text: payload.text,
          attachment: payload.attachment,
          ts: payload.ts
        });
      });

      startCallBtn.addEventListener('click', async () => {
        if(isCalling) return;
        try{
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
          localVideoEl.srcObject = localStream;
          callOverlay.classList.remove('hidden');
          document.getElementById('callState').textContent = 'Calling...';
          isCalling = true;
          startPeer(true);
        }catch(err){
          alert('Camera/Mic permission error: ' + err.message);
        }
      });

      socket.on('incoming_call', (data) => {
        incomingSignalData = data.signal;
        incoming.classList.remove('hidden');
        document.getElementById('incomingText').textContent = `${data.callerName || 'Peer'} is calling...`;
      });

      answerBtn.onclick = async () => {
        incoming.classList.add('hidden');
        try{
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
          localVideoEl.srcObject = localStream;
          callOverlay.classList.remove('hidden');
          isCalling = true;
          startPeer(false);
          if(peer && incomingSignalData){
            peer.signal(incomingSignalData);
          }
        }catch(err){
          alert('Camera/Mic error: ' + err.message);
        }
      };

      declineBtn.onclick = () => {
        incoming.classList.add('hidden');
        socket.emit('decline_call');
      };

      socket.on('call_accepted', (signal) => {
        if(peer && signal){
          peer.signal(signal);
        }
        document.getElementById('callState').textContent = 'Connected';
      });

      socket.on('call_ended', () => endCall());
      socket.on('call_declined', () => {
        alert('Call declined.');
        endCall();
      });

      function startPeer(initiator){
        peer = new SimplePeer({
          initiator: initiator,
          trickle: true,
          stream: localStream,
          config: peerConfig
        });

        peer.on('signal', data => {
          if(initiator){
            socket.emit('call_user', { signal: data, isVideo: true });
          } else {
            socket.emit('answer_call', { signal: data });
          }
        });

        peer.on('stream', stream => {
          remoteVideo.srcObject = stream;
          document.getElementById('callState').textContent = 'Connected';
        });

        peer.on('error', err => {
          console.error('Peer error:', err);
          endCall();
        });

        peer.on('close', () => endCall());
      }

      hangupBtn.addEventListener('click', () => {
        socket.emit('hangup');
        endCall();
      });

      muteBtn.addEventListener('click', () => {
        if(!localStream) return;
        const audioTrack = localStream.getAudioTracks()[0];
        if(audioTrack){
          audioTrack.enabled = !audioTrack.enabled;
          muteBtn.classList.toggle('active', !audioTrack.enabled);
          muteBtn.textContent = audioTrack.enabled ? '🎙️' : '🔇';
        }
      });

      cameraToggleBtn.addEventListener('click', () => {
        if(!localStream) return;
        const videoTrack = localStream.getVideoTracks()[0];
        if(videoTrack){
          videoTrack.enabled = !videoTrack.enabled;
          cameraToggleBtn.classList.toggle('active', !videoTrack.enabled);
          cameraToggleBtn.textContent = videoTrack.enabled ? '📷' : '🚫';
        }
      });

      function endCall(){
        if(peer){
          try{ peer.destroy(); }catch(e){}
          peer = null;
        }
        if(localStream){
          localStream.getTracks().forEach(t => t.stop());
          localStream = null;
        }
        remoteVideo.srcObject = null;
        localVideoEl.srcObject = null;
        isCalling = false;
        callOverlay.classList.add('hidden');
        incoming.classList.add('hidden');
      }
    });
  })();
  </script>
</body>
</html>
