<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Instant 1v1 Chat & Call — Aurora Cyber-Glass</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-1: #04060a;
      --panel: rgba(20,30,40,0.42);
      --panel-strong: rgba(12,18,24,0.6);
      --glass-border: rgba(0,255,157,0.14);
      --neon: #00ff9d; /* neon green */
      --accent-cyan: #00e5ff;
      --accent-purple: #9b7bff;
      --muted: rgba(230,240,255,0.18);
      --text: #e6f7ff;
      --sub: #89a3b6;
      --glass-blur: 12px;
      --radius: 14px;
      --transition: 280ms cubic-bezier(.2,.9,.2,1);
    }

    /* full-screen animated background */
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#02040a 0%, #071022 50%, #050814 100%);font-family:Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}

    .bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
    .orb{position:absolute;border-radius:50%;filter:blur(40px);opacity:0.75;mix-blend-mode:screen;animation:move 18s ease-in-out infinite alternate;}
    .orb.o1{width:520px;height:520px;left:-8%;top:10%;background:radial-gradient(circle at 30% 30%,var(--accent-purple),transparent 40%),radial-gradient(circle at 70% 70%,var(--accent-cyan),transparent 50%);animation-duration:28s;}
    .orb.o2{width:420px;height:420px;right:-5%;bottom:10%;background:radial-gradient(circle at 40% 40%,var(--neon),transparent 35%),radial-gradient(circle at 60% 60%,var(--accent-cyan),transparent 45%);animation-duration:22s;}
    .orb.o3{width:260px;height:260px;left:40%;top:55%;background:radial-gradient(circle at 30% 30%,rgba(0,255,157,0.25),transparent 45%),radial-gradient(circle at 70% 70%,rgba(155,123,255,0.14),transparent 55%);animation-duration:20s;}
    @keyframes move{0%{transform:translateY(0) translateX(0) scale(1)}50%{transform:translateY(-6vh) translateX(4vw) scale(1.08)}100%{transform:translateY(0) translateX(-3vw) scale(.98)}}

    /* app container */
    .app-wrap{position:relative;z-index:2;height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
    .app-container{width:100%;max-width:720px;height:100%;display:flex;flex-direction:column;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:18px;padding:14px;box-sizing:border-box;backdrop-filter:blur(var(--glass-blur));border:1px solid rgba(255,255,255,0.03);box-shadow:0 10px 40px rgba(3,8,18,0.6);overflow:hidden}

    /* top bar */
    .chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid var(--panel-strong);box-shadow:inset 0 0 30px rgba(0,0,0,0.25);backdrop-filter:blur(8px);}
    .user-info{display:flex;align-items:center;gap:12px;cursor:pointer}
    .avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;background:linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));position:relative;border:1px solid rgba(255,255,255,0.04)}
    .avatar::after{content:'';position:absolute;inset:-6px;border-radius:50%;box-shadow:0 0 18px rgba(0,255,157,0.08),0 0 40px rgba(155,123,255,0.03);pointer-events:none}
    .user-meta h3{margin:0;font-size:16px;letter-spacing:0.2px}
    .user-meta span{font-size:12px;color:var(--sub)}

    .header-buttons{display:flex;gap:10px}
    .header-btn{background:transparent;border:none;padding:8px;font-size:18px;border-radius:10px;color:var(--neon);cursor:pointer;transition:all var(--transition);display:inline-flex;align-items:center;justify-content:center}
    .header-btn:hover{transform:translateY(-3px);box-shadow:0 6px 22px rgba(0,255,157,0.06),0 0 8px rgba(0,229,255,0.03)}

    /* main area */
    .main-area{flex:1;display:flex;gap:14px;margin-top:12px;min-height:0}

    /* chat column */
    .chat-panel{flex:1;display:flex;flex-direction:column;border-radius:12px;padding:12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);backdrop-filter:blur(8px);box-shadow:inset 0 0 30px rgba(0,0,0,0.25);overflow:hidden}

    #chat-box{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    /* messages */
    .msg{max-width:78%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.3;color:var(--text);background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.02);backdrop-filter:blur(6px);box-shadow:0 6px 18px rgba(2,6,10,0.4);transform-origin:bottom;animation:slideUp .36s var(--transition) both}
    .msg.left{align-self:flex-start;border-top-left-radius:4px;background:linear-gradient(180deg, rgba(255,255,255,0.015), rgba(0,0,0,0.06));}
    .msg.right{align-self:flex-end;background:linear-gradient(180deg, rgba(0,255,157,0.06), rgba(0,255,157,0.02));border:1px solid rgba(0,255,157,0.09);box-shadow:0 6px 26px rgba(0,255,157,0.04);}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px) scale(.995)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* footer input */
    .chat-footer{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;margin-top:10px;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));border:1px solid rgba(255,255,255,0.02);backdrop-filter:blur(6px)}
    .input-wrapper{flex:1;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:999px;padding:6px 12px;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,0.02)}
    input{flex:1;border:none;background:transparent;color:var(--text);outline:none;font-size:15px;padding:8px}
    .send-btn{width:52px;height:52px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--neon),var(--accent-cyan));color:#001018;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(0,255,157,0.12);transition:transform var(--transition),box-shadow var(--transition)}
    .send-btn:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,255,157,0.18)}

    /* call overlay */
    #fullscreen-call-screen{position:fixed;inset:0;display:none;z-index:50;align-items:center;justify-content:center;padding:30px;box-sizing:border-box;background:linear-gradient(180deg,rgba(2,4,8,0.75),rgba(3,6,14,0.85));backdrop-filter:blur(6px)}
    .call-area{width:100%;max-width:980px;height:100%;max-height:740px;border-radius:18px;padding:26px;box-sizing:border-box;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:space-between;position:relative;overflow:hidden}

    .video-stage{position:relative;flex:1;width:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.35));border-radius:12px;overflow:hidden}
    #remoteVideo{width:100%;height:100%;object-fit:cover;filter:brightness(.9) contrast(1.05);}
    #localVideo{position:absolute;right:22px;bottom:22px;width:120px;height:160px;border-radius:12px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 10px 30px rgba(0,0,0,0.6)}

    .call-profile{position:absolute;left:28px;top:28px;display:flex;align-items:center;gap:16px}
    .call-avatar{width:92px;height:92px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));position:relative;border:1px solid rgba(255,255,255,0.04)}
    .call-avatar .ring{position:absolute;inset:-8px;border-radius:50%;pointer-events:none;box-shadow:0 0 30px rgba(0,255,157,0.12),0 0 80px rgba(155,123,255,0.04);}
    .call-meta h2{margin:0;font-size:20px}
    .call-meta p{margin:2px 0 0;color:var(--sub);font-size:13px}

    .call-controls{display:flex;gap:14px;align-items:center;justify-content:center;margin-bottom:12px}
    .ctrl-btn{width:68px;height:68px;border-radius:999px;border:none;background:linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));display:inline-flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;box-shadow:0 14px 40px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.03);transition:transform var(--transition),box-shadow var(--transition)}
    .ctrl-btn.primary{background:linear-gradient(135deg,#ff3b7a,#00ff9d);color:#001018;box-shadow:0 20px 60px rgba(0,255,157,0.12)}

    /* incoming overlay */
    #incoming-overlay{position:fixed;inset:0;display:none;z-index:60;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.7));}

    /* mobile optimizations */
    @media (max-width:720px){
      .app-container{padding:10px;border-radius:0;height:100vh}
      .main-area{flex-direction:column}
      .chat-panel{order:2;height:calc(100vh - 170px);}
      .chat-header{order:1}
      .chat-footer{position:sticky;bottom:12px;margin-top:auto}
      .call-avatar{width:72px;height:72px}
      #localVideo{width:100px;height:130px;right:12px;bottom:12px}
    }

  </style>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>
  <div class="bg-canvas" aria-hidden="true">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
  </div>

  <div class="app-wrap">
    <div class="app-container" id="mainAppWrap">
      <div class="chat-header">
        <div class="user-info" onclick="triggerProfileSetup()">
          <div class="avatar" id="main-avatar">C</div>
          <div class="user-meta">
            <h3 id="header-title">Connected Peer</h3>
            <span id="typing-status">offline</span>
          </div>
        </div>
        <div class="header-buttons">
          <button class="header-btn" onclick="toggleTheme()" title="Toggle Theme">🌓</button>
          <button class="header-btn" onclick="startCall(false)" title="Start Voice Call">📞</button>
          <button class="header-btn" onclick="startCall(true)" title="Start Video Call">📹</button>
        </div>
      </div>

      <div class="main-area">
        <div class="chat-panel">
          <div id="chat-box"></div>

          <div class="chat-footer">
            <div class="input-wrapper">
              <input type="text" id="message-input" placeholder="Type a message" onkeypress="handleKeyPress(event)" oninput="handleTyping(true)" onblur="handleTyping(false)">
            </div>
            <button class="send-btn" onclick="sendMessage()" type="button">➤</button>
          </div>
        </div>
      </div>

      <!-- Hidden file input kept for avatar changes -->
      <input type="file" id="avatar-input" accept="image/*" onchange="loadAvatar(event)" style="display:none">

      <!-- Call Screen Overlay -->
      <div id="fullscreen-call-screen">
        <div class="call-area">
          <div class="video-stage">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="call-profile">
              <div class="call-avatar" id="call-screen-avatar">
                <div class="ring"></div>
                C
              </div>
              <div class="call-meta">
                <h2 id="call-screen-name">Connected Peer</h2>
                <p id="callDurationLabel">Calling...</p>
              </div>
            </div>
          </div>

          <div class="call-controls" style="width:100%;justify-content:center;">
            <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()">🎙️</button>
            <button class="ctrl-btn" id="speakerBtn" onclick="toggleSpeaker()">🔊</button>
            <button class="ctrl-btn primary btn-hangup" onclick="hangupCall()">🛑</button>
            <button class="ctrl-btn" id="cameraBtn" onclick="toggleCamera()">📷</button>
          </div>
        </div>
      </div>

      <!-- Incoming Call Overlay -->
      <div id="incoming-overlay">
        <div style="display:flex;flex-direction:column;align-items:center;gap:18px">
          <div class="call-avatar" id="incoming-avatar"><div class="ring"></div>C</div>
          <h2 id="ring-label" style="margin:0;font-size:20px;color:var(--text)">Incoming Call...</h2>
          <div style="display:flex;gap:12px">
            <button class="ctrl-btn primary" onclick="answerCall()">🟢 Answer</button>
            <button class="ctrl-btn" onclick="hangupCall()">❌ Decline</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const BACKEND_URL = "https://dark-chat-backend-2v8y.onrender.com";
    const socket = io(BACKEND_URL);

    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const typingStatusEl = document.getElementById('typing-status');

    let localStream;
    let peer;
    let incomingSignal;
    let isVideoCall = false;
    let typingTimeout;
    let currentOnlineState = "offline";

    let micEnabled = true;
    let camEnabled = true;
    let speakerEnabled = true;

    // STUN/TURN config (Google STUN + OpenRelay TURN demo)
    const peerConfig = {
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'stun:stun2.l.google.com:19302' },
          { urls: 'stun:openrelay.metered.ca:80' },
          { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
        ]
      }
    };

    function triggerProfileSetup() {
      const newName = prompt("Enter peer display name:", document.getElementById('header-title').innerText);
      if (newName && newName.trim() !== "") {
        const updatedName = newName.trim();
        document.getElementById('header-title').innerText = updatedName;
        document.getElementById('call-screen-name').innerText = updatedName;
        document.getElementById('main-avatar').innerText = updatedName.charAt(0).toUpperCase();
        document.getElementById('call-screen-avatar').innerText = updatedName.charAt(0).toUpperCase();
        document.getElementById('incoming-avatar').innerText = updatedName.charAt(0).toUpperCase();
      }
      if (confirm("Do you want to change the profile photo?")) {
        document.getElementById('avatar-input').click();
      }
    }

    function loadAvatar(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          const imgUrl = e.target.result;
          const avatars = ['main-avatar', 'call-screen-avatar', 'incoming-avatar'];
          avatars.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
              el.style.backgroundImage = `url('${imgUrl}')`;
              el.style.backgroundSize = 'cover';
              el.innerText = '';
            }
          });
        }
        reader.readAsDataURL(file);
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('light-theme');
    }

    function toggleSpeaker() {
      speakerEnabled = !speakerEnabled;
      const remoteVideo = document.getElementById('remoteVideo');
      if (remoteVideo) remoteVideo.muted = !speakerEnabled;
      const btn = document.getElementById('speakerBtn');
      if (btn) { btn.innerText = speakerEnabled ? '🔊' : '🔈'; btn.classList.toggle('active-off', !speakerEnabled); }
    }

    socket.on('user_count_update', (count) => {
      if (count >= 2) {
        currentOnlineState = 'online'; if (typingStatusEl) typingStatusEl.innerText = 'online';
      } else {
        currentOnlineState = 'offline'; if (typingStatusEl) typingStatusEl.innerText = 'offline';
      }
    });

    socket.on('receive_message', (msg) => appendMessage(msg, 'left'));

    socket.on('user_typing', (isTyping) => {
      if (typingStatusEl) {
        if (isTyping) { typingStatusEl.innerText = 'typing...'; typingStatusEl.style.color = 'var(--neon)'; }
        else { typingStatusEl.innerText = currentOnlineState; typingStatusEl.style.color = 'var(--sub)'; }
      }
    });

    function handleTyping(isTyping) {
      if (!socket) return;
      if (!isTyping) { socket.emit('typing', false); return; }
      socket.emit('typing', true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit('typing', false), 2000);
    }

    function sendMessage() {
      const message = messageInput.value.trim();
      if (message !== '') {
        socket.emit('send_message', message);
        appendMessage(message, 'right');
        messageInput.value = '';
        socket.emit('typing', false);
        messageInput.focus();
      }
    }

    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

    function appendMessage(text, side) {
      if (!chatBox) return;
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('msg', side);
      msgDiv.innerText = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function getMedia(wantVideo) {
      if (!localStream) {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: wantVideo });
        const localVideo = document.getElementById('localVideo'); if (localVideo) localVideo.srcObject = localStream;
      }
      return localStream;
    }

    async function startCall(videoOption) {
      isVideoCall = videoOption;
      document.getElementById('chat-view')?.style?.display = 'none';
      document.getElementById('fullscreen-call-screen').style.display = 'flex';
      document.getElementById('callDurationLabel').innerText = isVideoCall ? 'Starting video call...' : 'Starting voice call...';
      try {
        const stream = await getMedia(isVideoCall);
        peer = new SimplePeer({ initiator: true, trickle: false, stream: stream, config: peerConfig.config });
        peer.on('signal', (data) => { socket.emit('call_user', { signal: data, isVideo: isVideoCall }); });
        peer.on('stream', (remoteStream) => {
          const remoteVideo = document.getElementById('remoteVideo');
          if (remoteVideo) { remoteVideo.srcObject = remoteStream; remoteVideo.muted = !speakerEnabled; }
          document.getElementById('callDurationLabel').innerText = isVideoCall ? 'Active Video Call' : 'Active Voice Call';
        });
      } catch (err) { alert('Media/Permission error: ' + err.message); hangupCall(); }
    }

    socket.on('incoming_call', (data) => {
      incomingSignal = data.signal; isVideoCall = data.isVideo;
      document.getElementById('incoming-overlay').style.display = 'flex';
      document.getElementById('ring-label').innerText = isVideoCall ? 'Incoming Video Call...' : 'Incoming Voice Call...';
    });

    async function answerCall() {
      document.getElementById('incoming-overlay').style.display = 'none';
      document.getElementById('chat-view')?.style?.display = 'none';
      document.getElementById('fullscreen-call-screen').style.display = 'flex';
      document.getElementById('callDurationLabel').innerText = 'Connecting...';
      try {
        const stream = await getMedia(isVideoCall);
        peer = new SimplePeer({ initiator: false, trickle: false, stream: stream, config: peerConfig.config });
        peer.on('signal', (data) => { socket.emit('answer_call', { signal: data }); });
        peer.on('stream', (remoteStream) => {
          const remoteVideo = document.getElementById('remoteVideo');
          if (remoteVideo) { remoteVideo.srcObject = remoteStream; remoteVideo.muted = !speakerEnabled; }
          document.getElementById('callDurationLabel').innerText = isVideoCall ? 'Active Video Call' : 'Active Voice Call';
        });
        peer.signal(incomingSignal);
      } catch (err) { alert('Media/Permission error: ' + err.message); hangupCall(); }
    }

    socket.on('call_accepted', (signal) => { if (peer) peer.signal(signal); });

    function toggleMute() {
      if (localStream) {
        micEnabled = !micEnabled; localStream.getAudioTracks()[0].enabled = micEnabled;
        const btn = document.getElementById('muteBtn'); if (btn) { btn.innerText = micEnabled ? '🎙️' : '🔇'; btn.classList.toggle('active-off', !micEnabled); }
      }
    }

    function toggleCamera() {
      if (localStream && localStream.getVideoTracks().length > 0) {
        camEnabled = !camEnabled; localStream.getVideoTracks()[0].enabled = camEnabled;
        const btn = document.getElementById('cameraBtn'); if (btn) { btn.innerText = camEnabled ? '📷' : '❌📷'; btn.classList.toggle('active-off', !camEnabled); }
      }
    }

    function hangupCall() {
      socket.emit('hangup'); resetUI();
    }

    socket.on('call_ended', () => resetUI());

    function resetUI() {
      if (peer) { try { peer.destroy(); } catch (e) {} peer = null; }
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      const lv = document.getElementById('localVideo'); if (lv) lv.srcObject = null;
      const rv = document.getElementById('remoteVideo'); if (rv) rv.srcObject = null;
      document.getElementById('fullscreen-call-screen').style.display = 'none';
      document.getElementById('incoming-overlay').style.display = 'none';
      document.getElementById('chat-view')?.style?.display = 'flex';
      micEnabled = true; camEnabled = true; speakerEnabled = true;
      const muteBtn = document.getElementById('muteBtn'); if (muteBtn) { muteBtn.innerText = '🎙️'; muteBtn.classList.remove('active-off'); }
      const cameraBtn = document.getElementById('cameraBtn'); if (cameraBtn) { cameraBtn.innerText = '📷'; cameraBtn.classList.remove('active-off'); }
      const speakerBtn = document.getElementById('speakerBtn'); if (speakerBtn) { speakerBtn.innerText = '🔊'; speakerBtn.classList.remove('active-off'); }
    }

    function adjustMobileHeight() {
      const targetHeight = window.innerHeight;
      const mainAppWrap = document.getElementById('mainAppWrap');
      if (mainAppWrap) mainAppWrap.style.height = targetHeight + 'px';
      if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
    }
    window.addEventListener('resize', adjustMobileHeight);
    window.addEventListener('load', adjustMobileHeight);
    adjustMobileHeight();
  </script>
</body>
</html>
