<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sleek 1v1 Chat</title>
    <style>
        /* CSS resets for absolute mobile application fullscreen wrap */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            background: #0b141a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #e9edef;
        }
        
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* Fixed Layout Structure - dynamically scales safely on mobile webviews */
        .app-container { 
            width: 100%; 
            height: 100%; 
            max-width: 450px; 
            background: #0b141a; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
            box-sizing: border-box;
        }
        
        @media (min-width: 451px) { 
            .app-container { 
                height: 90vh; 
                border-radius: 10px; 
                border: 1px solid #222; 
            } 
        }

        /* WhatsApp Style Header Bar */
        .chat-header { 
            background: #202c33; 
            padding: 10px 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid #2f3b43; 
            flex-shrink: 0; /* Prevents header from shrinking */
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 38px; height: 38px; background: #687e8c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .user-status h3 { margin: 0; font-size: 15px; font-weight: 600; }
        .user-status span { font-size: 11px; color: #8696a0; }
        .header-buttons { display: flex; gap: 16px; }
        .header-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; color: #00a884; }

        /* Dynamic Video Container */
        .video-container { display: none; background: #000; padding: 6px; box-sizing: border-box; border-bottom: 1px solid #2f3b43; flex-shrink: 0; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; }
        video { width: 100%; height: 120px; background: #111; border-radius: 8px; object-fit: cover; border: 1px solid #333; }

        /* Chat Message Box Area with Scroll */
        #chat-box { 
            flex: 1; 
            padding: 16px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            background-image: linear-gradient(rgba(11,20,26,0.95), rgba(11,20,26,0.95)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-size: contain; 
        }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .msg.left { background: #202c33; align-self: flex-start; color: #e9edef; border-top-left-radius: 0; }
        .msg.right { background: #005c4b; align-self: flex-end; color: #e9edef; border-top-right-radius: 0; }
        
        /* Incoming Call Popup Overlay */
        #incoming-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(11,20,26,0.9); z-index: 99; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .ring-btn { padding: 12px 24px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 14px; color: white; display: flex; align-items: center; gap: 8px; }

        /* Input Area Footer Layout Fixes */
        .chat-footer { 
            background: #202c33; 
            padding: 10px 12px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex-shrink: 0; /* Keeps footer pinned layout at bottom */
            box-sizing: border-box;
        }
        .input-wrapper { flex: 1; background: #2a3942; border-radius: 24px; padding: 2px 12px; display: flex; align-items: center; }
        input { width: 100%; padding: 10px 4px; border: none; background: transparent; color: white; outline: none; font-size: 15px; }
        
        /* FIXED: Amplified click targets for mobile screens */
        .send-btn { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            background: #00a884; 
            border: none; 
            color: white; 
            font-size: 16px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            flex-shrink: 0;
            padding: 0;
        }
        .send-btn:active { background: #008f72; }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>

<div class="app-container">
    <div class="chat-header">
        <div class="user-info">
            <div class="avatar">C</div>
            <div class="user-status">
                <h3 id="header-title">Connected Peer</h3>
                <span id="typing-status">online</span>
            </div>
        </div>
        <div class="header-buttons">
            <button class="header-btn" onclick="startCall(false)">📞</button>
            <button class="header-btn" onclick="startCall(true)">📹</button>
        </div>
    </div>

    <div class="video-container" id="mediaContainer">
        <div class="video-grid">
            <video id="localVideo" autoplay muted playsinline></video>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <button onclick="hangupCall()" style="width:100%; background:#ea0038; color:white; border:none; padding:10px; border-radius:5px; font-weight:bold; margin-top:6px; cursor:pointer;">❌ End Call</button>
    </div>

    <div id="chat-box"></div>

    <div id="incoming-overlay">
        <h2 id="ring-label" style="color:white; margin:0;">Incoming Call...</h2>
        <div style="display:flex; gap:15px;">
            <button class="ring-btn" onclick="answerCall()" style="background:#00a884;">🟢 Answer</button>
            <button class="ring-btn" onclick="hangupCall()" style="background:#ea0038;">❌ Decline</button>
        </div>
    </div>

    <div class="chat-footer">
        <div class="input-wrapper">
            <input type="text" id="message-input" placeholder="Type a message" onkeypress="handleKeyPress(event)" oninput="handleTyping(true)" onblur="handleTyping(false)">
        </div>
        <button class="send-btn" id="send-button-element" onclick="sendMessage()" type="button">🕊️</button>
    </div>
</div>

<script>
    const BACKEND_URL = "https://dark-chat-backend-2v8y.onrender.com"; 
    const socket = io(BACKEND_URL);
    
    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    
    let localStream;
    let peer;
    let incomingSignal;
    let isVideoCall = false;
    let typingTimeout;

    // --- TEXT CHAT & TYPING ---
    socket.on('receive_message', (msg) => appendMessage(msg, 'left'));

    socket.on('user_typing', (isTyping) => {
        document.getElementById('typing-status').innerText = isTyping ? "typing..." : "online";
    });

    function handleTyping(isTyping) {
        if (!isTyping) {
            socket.emit('typing', false);
            return;
        }
        socket.emit('typing', true);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => socket.emit('typing', false), 2000);
    }

    // FIXED: Formatted processing rules preventing submission faults
    function sendMessage() {
        const message = messageInput.value.trim();
        if(message !== "") {
            socket.emit('send_message', message);
            appendMessage(message, 'right');
            messageInput.value = "";
            socket.emit('typing', false);
            messageInput.focus(); // Keeps keyboard open on mobile after click
        }
    }

    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

    function appendMessage(text, side) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg', side);
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- WEBRTC CALL HANDLING ---
    async function getMedia(wantVideo) {
        if (!localStream) {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: wantVideo });
            document.getElementById('localVideo').srcObject = localStream;
        }
        return localStream;
    }

    async function startCall(videoOption) {
        isVideoCall = videoOption;
        document.getElementById('mediaContainer').style.display = 'block';
        document.getElementById('header-title').innerText = "Calling...";
        
        const stream = await getMedia(isVideoCall);
        peer = new SimplePeer({ initiator: true, trickle: false, stream: stream });

        peer.on('signal', (data) => {
            socket.emit('call_user', { signal: data, isVideo: isVideoCall });
        });

        peer.on('stream', (remoteStream) => {
            document.getElementById('remoteVideo').srcObject = remoteStream;
            document.getElementById('header-title').innerText = "Active Call";
        });
    }

    socket.on('incoming_call', (data) => {
        incomingSignal = data.signal;
        isVideoCall = data.isVideo; 
        document.getElementById('incoming-overlay').style.display = 'flex';
        document.getElementById('ring-label').innerText = isVideoCall ? "📹 Video Call Request..." : "📞 Voice Call Request...";
    });

    async function answerCall() {
        document.getElementById('incoming-overlay').style.display = 'none';
        document.getElementById('mediaContainer').style.display = 'block';
        document.getElementById('header-title').innerText = "Connecting...";
        
        const stream = await getMedia(isVideoCall);
        peer = new SimplePeer({ initiator: false, trickle: false, stream: stream });

        peer.on('signal', (data) => {
            socket.emit('answer_call', { signal: data });
        });

        peer.on('stream', (remoteStream) => {
            document.getElementById('remoteVideo').srcObject = remoteStream;
            document.getElementById('header-title').innerText = "Active Call";
        });

        peer.signal(incomingSignal);
    }

    socket.on('call_accepted', (signal) => peer.signal(signal));

    function hangupCall() {
        socket.emit('hangup');
        resetUI();
    }

    socket.on('call_ended', () => resetUI());

    function resetUI() {
        if (peer) { peer.destroy(); peer = null; }
        if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        document.getElementById('localVideo').srcObject = null;
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('mediaContainer').style.display = 'none';
        document.getElementById('incoming-overlay').style.display = 'none';
        document.getElementById('header-title').innerText = "Connected Peer";
    }
</script>
</body>
</html>
