<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Dark Multi-Room Chat</title>
    <style>
        /* CSS Variables to handle instant Theme Switching */
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #252525;
            --bg-box: #181818;
            --primary: #bb86fc; /* Default Purple Accent */
            --secondary: #03dac6; /* Default Teal Accent */
            --danger: #cf6679;
            --text: #e0e0e0;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-main); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { width: 360px; background: var(--bg-card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        h2 { text-align: center; margin-top: 0; color: var(--primary); }
        
        /* Lobby Screen Layout */
        #lobby-panel { display: flex; flex-direction: column; gap: 12px; }
        .theme-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 5px 0; }
        .theme-dot { height: 35px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #000; }
        
        /* Chat Dashboard Layout */
        #chat-panel { display: none; flex-direction: column; }
        .room-header { text-align: center; font-size: 14px; color: var(--secondary); margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        video { width: 100%; height: 120px; background: #000; border-radius: 8px; object-fit: cover; border: 1px solid #333; }
        
        #chat-box { height: 220px; border: 1px solid #333; background: var(--bg-box); padding: 10px; overflow-y: auto; margin-bottom: 4px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; }
        #typing-indicator { height: 16px; font-size: 12px; color: #aaa; margin-bottom: 10px; padding-left: 5px; font-style: italic; }
        
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 15px; font-size: 14px; word-wrap: break-word; }
        .msg.left { background: #2d2d2d; align-self: flex-start; color: #fff; }
        .msg.right { background: var(--primary); align-self: flex-end; color: #000; font-weight: 500; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
        .msg a { color: #fff; text-decoration: underline; display: block; margin-top: 5px; font-weight: bold; }

        .input-area { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; }
        input { flex: 1; padding: 10px; border: 1px solid #333; border-radius: 6px; background: var(--bg-input); color: white; outline: none; }
        button { padding: 10px 14px; border: none; border-radius: 6px; background: var(--secondary); color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        button:hover { opacity: 0.9; }
        
        /* File Share Button Look */
        .file-label { padding: 10px; background: #2d2d2d; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; }
        .file-label:hover { background: #3d3d3d; }

        .call-controls { display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #333; padding-top: 15px; }
        .action-btns { display: flex; gap: 8px; }
        .action-btns button { flex: 1; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: #333; color: white; border: 1px solid #555; }
        .active-off { background: #555; color: var(--danger); }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Dark Chat</h2>
    
    <div id="lobby-panel">
        <label style="font-size:14px; color:#aaa;">Enter Room Name / Code:</label>
        <input type="text" id="room-input" placeholder="e.g. gaming-room, lounge123">
        
        <label style="font-size:14px; color:#aaa; margin-top:5px;">🎨 Select Accent Accent:</label>
        <div class="theme-selector">
            <div class="theme-dot" style="background:#bb86fc;" onclick="setTheme('#bb86fc','#03dac6')">Purp</div>
            <div class="theme-dot" style="background:#ff79c6;" onclick="setTheme('#ff79c6','#8be9fd')">Pink</div>
            <div class="theme-dot" style="background:#50fa7b;" onclick="setTheme('#50fa7b','#f1fa8c')">Neon</div>
            <div class="theme-dot" style="background:#ffb86c;" onclick="setTheme('#ffb86c','#ff5555')">Fire</div>
        </div>
        
        <button onclick="joinRoom()" style="margin-top:10px; height:42px; font-size:15px;">🚀 Join Chat Space</button>
    </div>

    <div id="chat-panel">
        <div id="active-room-title" class="room-header">Room: None</div>
        
        <div class="video-grid">
            <div>
                <small style="display:block; text-align:center; margin-bottom:4px; color:#aaa;">You</small>
                <video id="localVideo" autoplay muted playsinline></video>
            </div>
            <div>
                <small style="display:block; text-align:center; margin-bottom:4px; color:#aaa;">Remote</small>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>

        <div id="chat-box"></div>
        <div id="typing-indicator"></div>

        <div class="input-area">
            <label class="file-label" title="Share an image or document">
                📎
                <input type="file" id="file-input" style="display:none;" onchange="sendFile(this)">
            </label>
            
            <input type="text" id="message-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)" oninput="emitTypingState(true)" onblur="emitTypingState(false)">
            <button onclick="sendMessage()">Send</button>
        </div>

        <div class="call-controls">
            <div id="outgoingBtns" class="action-btns">
                <button id="audioCallBtn" onclick="startCall(false)">📞 Voice</button>
                <button id="videoCallBtn" onclick="startCall(true)">📹 Video</button>
            </div>
            
            <button id="answerBtn" onclick="answerCall()" style="display:none; width: 100%;">🟢 Incoming Call</button>
            
            <div id="activeCallControls" style="display:none; display: flex; flex-direction:column; gap:8px;">
                <div class="action-btns">
                    <button id="muteBtn" onclick="toggleMute()" class="btn-secondary">🎙️ Mute Mic</button>
                    <button id="cameraBtn" onclick="toggleCamera()" class="btn-secondary">📷 Cam Off</button>
                </div>
                <button id="hangupBtn" onclick="hangupCall()" class="btn-danger" style="width: 100%;">❌ End Call</button>
            </div>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = "https://dark-chat-backend-2v8y.onrender.com"; 
    
    const socket = io(BACKEND_URL);
    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const typingIndicator = document.getElementById('typing-indicator');
    
    let currentRoom = "";
    let localStream;
    let peer;
    let incomingSignal;
    let isVideoCall = false;
    let typingTimeout;
    
    let micEnabled = true;
    let camEnabled = true;

    // --- 🎨 ACCENT THEME TOGGLE LOGIC ---
    function setTheme(prim, sec) {
        document.documentElement.style.setProperty('--primary', prim);
        document.documentElement.style.setProperty('--secondary', sec);
    }

    // --- 👥 ROOM ENTRY HANDLING ---
    function joinRoom() {
        const roomInput = document.getElementById('room-input').value.trim();
        if (roomInput === "") {
            alert("Please input a valid room key!");
            return;
        }
        currentRoom = roomInput;
        document.getElementById('active-room-title').innerText = "Active Room: " + currentRoom;
        
        // Let backend pipeline know we are clustering here
        socket.emit('join_room', currentRoom);
        
        // Toggle view containers
        document.getElementById('lobby-panel').style.display = 'none';
        document.getElementById('chat-panel').style.display = 'flex';
    }

    // --- TEXT MESSAGING & INLINE STREAM UPDATES ---
    socket.on('receive_message', (message) => {
        appendMessage(message, 'left');
    });

    // 📂 Listen for shared files from room peers
    socket.on('receive_file', (data) => {
        appendFileMessage(data, 'left');
    });

    socket.on('user_typing', (isTyping) => {
        if (isTyping) {
            typingIndicator.innerText = "Someone is typing...";
        } else {
            typingIndicator.innerText = "";
        }
    });

    function emitTypingState(isTyping) {
        if (!currentRoom) return;
        if (!isTyping) {
            socket.emit('typing', { room: currentRoom, isTyping: false });
            return;
        }
        socket.emit('typing', { room: currentRoom, isTyping: true });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            socket.emit('typing', { room: currentRoom, isTyping: false });
        }, 2000);
    }

    function sendMessage() {
        const message = messageInput.value.trim();
        if(message !== "" && currentRoom) {
            socket.emit('send_message', { room: currentRoom, message: message });
            appendMessage(message, 'right');
            messageInput.value = "";
            emitTypingState(false);
        }
    }

    // 📂 Process local file upload and translate to payload
    function sendFile(element) {
        const file = element.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const filePayload = {
                room: currentRoom,
                fileData: e.target.result,
                fileName: file.name,
                fileType: file.type
            };
            socket.emit('send_file', filePayload);
            appendFileMessage(filePayload, 'right');
        };
        reader.readAsDataURL(file); // Converts binary files to text payload safely
        element.value = ''; // Reset input selection element
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function appendMessage(text, side) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg', side);
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendFileMessage(data, side) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg', side);
        
        const titleSpan = document.createElement('span');
        titleSpan.innerText = "Shared File: " + data.fileName;
        msgDiv.appendChild(titleSpan);

        // If it's an image, render preview directly inside chat box
        if (data.fileType.startsWith('image/')) {
            const img = document.createElement('img');
            img.src = data.fileData;
            msgDiv.appendChild(img);
        } else {
            // Otherwise render file asset as a safe external download link
            const link = document.createElement('a');
            link.href = data.fileData;
            link.download = data.fileName;
            link.innerText = "📥 Download File";
            msgDiv.appendChild(link);
        }

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- WEBRTC CALLING LOGIC (ROOM ISOLATED) ---
    async function getMedia(wantVideo) {
        if (!localStream) {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: wantVideo });
            if (wantVideo) {
                document.getElementById('localVideo').srcObject = localStream;
            }
        }
        return localStream;
    }

    async function startCall(videoOption) {
        if(!currentRoom) return;
        isVideoCall = videoOption;
        document.getElementById('outgoingBtns').style.display = 'none';
        document.getElementById('activeCallControls').style.display = 'block';
        
        const stream = await getMedia(isVideoCall);
        
        peer = new SimplePeer({ initiator: true, trickle: false, stream: stream });

        peer.on('signal', (data) => {
            socket.emit('call_user', { room: currentRoom, signal: data, isVideo: isVideoCall });
        });

        peer.on('stream', (remoteStream) => {
            document.getElementById('remoteVideo').srcObject = remoteStream;
        });
    }

    socket.on('incoming_call', (data) => {
        incomingSignal = data.signal;
        isVideoCall = data.isVideo;
        
        document.getElementById('outgoingBtns').style.display = 'none';
        
        const answerBtn = document.getElementById('answerBtn');
        answerBtn.style.display = 'block';
        answerBtn.innerText = isVideoCall ? "🟢 Answer Video Call" : "🟢 Answer Voice Call";
    });

    async function answerCall() {
        const stream = await getMedia(isVideoCall);
        document.getElementById('answerBtn').style.display = 'none';
        document.getElementById('activeCallControls').style.display = 'block';
        
        peer = new SimplePeer({ initiator: false, trickle: false, stream: stream });

        peer.on('signal', (data) => {
            socket.emit('answer_call', { room: currentRoom, signal: data });
        });

        peer.on('stream', (remoteStream) => {
            document.getElementById('remoteVideo').srcObject = remoteStream;
        });

        peer.signal(incomingSignal);
    }

    socket.on('call_accepted', (signal) => {
        peer.signal(signal);
    });

    function toggleMute() {
        if (localStream) {
            micEnabled = !micEnabled;
            localStream.getAudioTracks()[0].enabled = micEnabled;
            const btn = document.getElementById('muteBtn');
            btn.innerText = micEnabled ? "🎙️ Mute Mic" : "🔇 Unmute Mic";
            btn.classList.toggle('active-off', !micEnabled);
        }
    }

    function toggleCamera() {
        if (localStream && localStream.getVideoTracks().length > 0) {
            camEnabled = !camEnabled;
            localStream.getVideoTracks()[0].enabled = camEnabled;
            const btn = document.getElementById('cameraBtn');
            btn.innerText = camEnabled ? "📷 Cam Off" : "📸 Cam On";
            btn.classList.toggle('active-off', !camEnabled);
        }
    }

    function hangupCall() {
        socket.emit('hangup', { room: currentRoom });
        resetCallUI();
    }

    socket.on('call_ended', () => {
        resetCallUI();
    });

    function resetCallUI() {
        if (peer) {
            peer.destroy();
            peer = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        document.getElementById('localVideo').srcObject = null;
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('outgoingBtns').style.display = 'flex';
        document.getElementById('answerBtn').style.display = 'none';
        document.getElementById('activeCallControls').style.display = 'none';
        
        micEnabled = true;
        camEnabled = true;
        document.getElementById('muteBtn').innerText = "🎙️ Mute Mic";
        document.getElementById('muteBtn').classList.remove('active-off');
        document.getElementById('cameraBtn').innerText = "📷 Cam Off";
        document.getElementById('cameraBtn').classList.remove('active-off');
    }
</script>
</body>
</html>
